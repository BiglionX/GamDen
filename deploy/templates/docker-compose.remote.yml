version: '3.8'

# GamDen项目远程Docker部署模板
# 将此文件部署到服务器后使用

services:
  # PostgreSQL数据库
  postgres:
    image: postgres:15-alpine
    container_name: gamden-postgres
    environment:
      POSTGRES_DB: gamden_prod
      POSTGRES_USER: gamden_user
      POSTGRES_PASSWORD_FILE: /run/secrets/db_password
    secrets:
      - db_password
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./database/init:/docker-entrypoint-initdb.d
    ports:
      - "5432:5432"
    networks:
      - gamden-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U gamden_user -d gamden_prod"]
      interval: 30s
      timeout: 10s
      retries: 3

  # Redis缓存
  redis:
    image: redis:7-alpine
    container_name: gamden-redis
    command: redis-server --requirepass ${REDIS_PASSWORD:-GamDen2026!}
    volumes:
      - redis_data:/data
    ports:
      - "6379:6379"
    networks:
      - gamden-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 30s
      timeout: 10s
      retries: 3

  # 后端服务
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile.prod
    container_name: gamden-backend
    environment:
      NODE_ENV: production
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: gamden_prod
      DB_USER: gamden_user
      DB_PASSWORD_FILE: /run/secrets/db_password
      REDIS_URL: redis://:${REDIS_PASSWORD:-GamDen2026!}@redis:6379
      JWT_SECRET_FILE: /run/secrets/jwt_secret
      CORS_ORIGIN: http://localhost:3000,http://localhost:3002
    secrets:
      - db_password
      - jwt_secret
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    ports:
      - "3001:3001"
    networks:
      - gamden-network
    restart: unless-stopped
    volumes:
      - ./backend/logs:/app/logs
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3001/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  # 前端应用
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.prod
    container_name: gamden-frontend
    environment:
      REACT_APP_API_URL: http://localhost:3001/api/v1
      REACT_APP_ENV: production
    depends_on:
      - backend
    ports:
      - "3000:80"
    networks:
      - gamden-network
    restart: unless-stopped

  # 营销网站
  marketing:
    build:
      context: ./marketing-site
      dockerfile: Dockerfile.prod
    container_name: gamden-marketing
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:3001/api/v1
      NEXT_PUBLIC_ENV: production
    depends_on:
      - backend
    ports:
      - "3002:3000"
    networks:
      - gamden-network
    restart: unless-stopped

  # Nginx反向代理
  nginx:
    image: nginx:alpine
    container_name: gamden-nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf
      - ./nginx/ssl:/etc/nginx/ssl
      - ./nginx/logs:/var/log/nginx
    depends_on:
      - frontend
      - marketing
      - backend
    networks:
      - gamden-network
    restart: unless-stopped

volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local

networks:
  gamden-network:
    driver: bridge

secrets:
  db_password:
    file: ./secrets/db_password.txt
  jwt_secret:
    file: ./secrets/jwt_secret.txt