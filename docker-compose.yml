version: '3.8'

services:
  # GamDen 后端服务 (NestJS)
  gamden-backend:
    build:
      context: ./gamden-backend
      dockerfile: Dockerfile
    container_name: gamden-backend
    ports:
      - "3000:3000"
    env_file:
      - .env
    depends_on:
      - gamden-postgres
      - redis
    networks:
      - gamden-network
    restart: unless-stopped
    volumes:
      - ./gamden-backend/logs:/app/logs

  # GamDen 前端服务 (Next.js)
  gamden-frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: gamden-frontend
    ports:
      - "3001:3000"
    env_file:
      - .env
    networks:
      - gamden-network
    restart: unless-stopped

  # PostgreSQL 数据库 (NestJS 后端使用)
  gamden-postgres:
    image: postgres:16-alpine
    container_name: gamden-postgres
    environment:
      POSTGRES_USER: ${DB_USERNAME:-gamden}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-gamden_secret}
      POSTGRES_DB: ${DB_DATABASE:-gamden}
      POSTGRES_INITDB_ARGS: "--encoding=UTF8 --locale=C"
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./gamden-backend/src/entities/init:/docker-entrypoint-initdb.d:ro
    networks:
      - gamden-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USERNAME:-gamden} -d ${DB_DATABASE:-gamden}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Redis 缓存
  redis:
    image: redis:6.0
    container_name: gamden-redis
    command: redis-server --requirepass ${REDIS_PASSWORD}
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - gamden-network
    restart: unless-stopped

  # OpenIM Server（即时通讯）
  openim-server:
    image: openim/openim-server:latest
    container_name: gamden-openim
    ports:
      - "18080:18080"
      - "2443:2443"
    environment:
      - OPENIM_API_URL=http://openim-server:18080
    volumes:
      - openim_data:/data
      - ./openim/config:/config
    networks:
      - gamden-network
    restart: unless-stopped

  # 营销网站 (gamden.matux.tech)
  gamden-marketing:
    build:
      context: ./marketing-site
      dockerfile: Dockerfile
    container_name: gamden-marketing
    ports:
      - "3002:3000"
    networks:
      - gamden-network
    restart: unless-stopped

  # Nginx 反向代理
  nginx:
    image: nginx:alpine
    container_name: gamden-nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf
      - ./nginx/ssl:/etc/nginx/ssl
    depends_on:
      - gamden-backend
      - gamden-frontend
      - gamden-marketing
    networks:
      - gamden-network
    restart: unless-stopped

networks:
  gamden-network:
    driver: bridge

volumes:
  postgres_data:
  redis_data:
  openim_data:
