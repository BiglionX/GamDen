version: '3.8'

services:
  # GamDen后端服务
  gamden-backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: gamden-backend
    ports:
      - "3000:3000"
    env_file:
      - .env
    depends_on:
      - mysql
      - redis
    networks:
      - gamden-network
    restart: unless-stopped
    volumes:
      - ./backend/logs:/app/logs

  # GamDen前端服务（Next.js）
  gamden-frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: gamden-frontend
    ports:
      - "3001:3000"
    env_file:
      - .env
    networks:
      - gamden-network
    restart: unless-stopped

  # MySQL数据库
  mysql:
    image: mysql:8.0
    container_name: gamden-mysql
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_PASSWORD}
      MYSQL_DATABASE: ${DB_NAME}
      MYSQL_CHARACTER_SET_SERVER: utf8mb4
      MYSQL_COLLATION_SERVER: utf8mb4_unicode_ci
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./backend/sql:/docker-entrypoint-initdb.d
    networks:
      - gamden-network
    restart: unless-stopped
    command: --default-authentication-plugin=mysql_native_password

  # Redis缓存
  redis:
    image: redis:6.0
    container_name: gamden-redis
    command: redis-server --requirepass ${REDIS_PASSWORD}
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - gamden-network
    restart: unless-stopped

  # OpenIM Server（即时通讯）
  openim-server:
    image: openim/openim-server:latest
    container_name: gamden-openim
    ports:
      - "18080:18080"
      - "2443:2443"
    environment:
      - OPENIM_API_URL=http://openim-server:18080
    volumes:
      - openim_data:/data
      - ./openim/config:/config
    networks:
      - gamden-network
    restart: unless-stopped

  # 营销网站 (gamden.matux.tech)
  gamden-marketing:
    build:
      context: ./marketing-site
      dockerfile: Dockerfile
    container_name: gamden-marketing
    ports:
      - "3002:3000"
    networks:
      - gamden-network
    restart: unless-stopped

  # Nginx反向代理
  nginx:
    image: nginx:alpine
    container_name: gamden-nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf
      - ./nginx/ssl:/etc/nginx/ssl
    depends_on:
      - gamden-backend
      - gamden-frontend
      - gamden-marketing
    networks:
      - gamden-network
    restart: unless-stopped

networks:
  gamden-network:
    driver: bridge

volumes:
  mysql_data:
  redis_data:
  openim_data:
