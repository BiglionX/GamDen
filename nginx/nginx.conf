events {
    worker_connections 1024;
}

http {
    include       mime.types;
    default_type  application/octet-stream;

    sendfile        on;
    keepalive_timeout  65;

    # 上游服务器配置
    upstream backend {
        server gamden-backend:3000;
    }

    upstream frontend {
        server gamden-frontend:3000;
    }

    upstream marketing {
        server gamden-marketing:3000;
    }

    # ============================================================
    # GamDen 主站 (gamden.matux.tech)
    #   - 前端（Next.js）+ 后端 API（Express）
    #   - 游客/登录用户访问入口
    # ============================================================
    server {
        listen 80;
        server_name gamden.matux.tech;

        # 后端 API 请求
        location /api {
            proxy_pass http://backend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Forwarded-Host $host;
            proxy_read_timeout 60s;
        }

        # 微信/支付等第三方回调
        location /webhook {
            proxy_pass http://backend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # 健康检查
        location /health {
            proxy_pass http://backend;
            proxy_set_header Host $host;
        }

        # Next.js 客户端路由静态资源（优先匹配，避免被通用 location 拦截）
        location /_next/static {
            proxy_pass http://frontend;
            proxy_set_header Host $host;
            proxy_cache_valid 200 60m;
            expires 1h;
        }

        # Next.js WebSocket（HMR / 热更新）
        location /_next/webpack-hmr {
            proxy_pass http://frontend;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
        }

        # 前端路由 & 页面（Next.js SSR）
        location / {
            proxy_pass http://frontend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Forwarded-Host $host;
        }
    }

    # ============================================================
    # GamDen 营销官网 (marketing.matux.tech / www.matux.tech)
    # ============================================================
    server {
        listen 80;
        server_name marketing.matux.tech www.matux.tech;

        # Next.js 静态资源缓存
        location /_next/static {
            proxy_pass http://marketing;
            proxy_set_header Host $host;
            proxy_cache_valid 200 60m;
            expires 1h;
        }

        location / {
            proxy_pass http://marketing;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }
    }

    # ============================================================
    # GamDen 主站 (localhost / gamden.com / 兼容旧域名)
    # ============================================================
    server {
        listen 80;
        server_name localhost gamden.com;

        # API请求代理到后端
        location /api {
            proxy_pass http://backend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Forwarded-Host $host;
            proxy_read_timeout 60s;
        }

        # 第三方回调
        location /webhook {
            proxy_pass http://backend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # 健康检查
        location /health {
            proxy_pass http://backend;
            proxy_set_header Host $host;
        }

        # Next.js 静态资源
        location /_next/static {
            proxy_pass http://frontend;
            proxy_set_header Host $host;
            proxy_cache_valid 200 60m;
            expires 1h;
        }

        # WebSocket支持
        location /_next/webpack-hmr {
            proxy_pass http://frontend;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
        }

        # 静态资源和前端页面
        location / {
            proxy_pass http://frontend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Forwarded-Host $host;
        }
    }
}
